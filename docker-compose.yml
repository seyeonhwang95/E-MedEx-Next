services:
  control-plane-postgres:
    image: postgres:17
    container_name: emedex-control-plane-postgres
    environment:
      POSTGRES_DB: emedex_control
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - ./.data/postgres-control:/var/lib/postgresql/data

  demo-tenant-postgres:
    image: postgres:17
    container_name: emedex-demo-tenant-postgres
    environment:
      POSTGRES_DB: emedex_demo
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - ./.data/postgres-demo:/var/lib/postgresql/data

  redis:
    image: redis:8
    container_name: emedex-redis
    ports:
      - "6379:6379"

  opensearch:
    image: opensearchproject/opensearch:3
    container_name: emedex-opensearch
    environment:
      discovery.type: single-node
      plugins.security.disabled: "true"
      OPENSEARCH_INITIAL_ADMIN_PASSWORD: admin
    ports:
      - "9200:9200"
      - "9600:9600"
    volumes:
      - ./.data/opensearch:/usr/share/opensearch/data

  dashboards:
    image: opensearchproject/opensearch-dashboards:3
    container_name: emedex-opensearch-dashboards
    environment:
      OPENSEARCH_HOSTS: '["http://opensearch:9200"]'
    depends_on:
      - opensearch
    ports:
      - "5601:5601"

  minio:
    image: minio/minio:RELEASE.2025-02-28T09-55-16Z
    container_name: emedex-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - ./.data/minio:/data

  create-buckets:
    image: minio/mc:RELEASE.2025-02-21T16-00-46Z
    depends_on:
      - minio
    entrypoint: >-
      /bin/sh -c
      "mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb --ignore-existing local/emedex-media;
      mc anonymous set private local/emedex-media;"

  hl7-gateway:
    image: node:22-alpine
    container_name: emedex-hl7-gateway
    working_dir: /workspace
    volumes:
      - ./:/workspace
    command: sh -c "corepack enable && pnpm install && pnpm --filter @emedex/hl7-gateway dev"
    depends_on:
      - redis
    ports:
      - "2575:2575"